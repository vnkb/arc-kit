Run `cat ~/.gemini/extensions/arckit/skills/mermaid-syntax/references/flowchart.md` to read the file and `~/.gemini/extensions/arckit/skills/mermaid-syntax/references/gantt.md` for official Mermaid syntax — node shapes, edge labels, date formats, task statuses, and styling options.

### 8. Mermaid Diagram Requirements

